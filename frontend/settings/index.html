<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Settings | EventHub</title>

    <link rel="stylesheet" href="settings.css">
</head>

<body>

    <main class="settings-page">

        <section class="settings-card">

            <div class="settings-heading">

                <div class="settings-icon">
                    ⚙️
                </div>

                <div>
                    <p class="settings-label">
                        EVENTHUB SETTINGS
                    </p>

                    <h1>
                        Account Settings
                    </h1>

                    <p class="settings-subtitle">
                        Manage your profile and preferences.
                    </p>
                </div>

            </div>

            <div class="settings-section">

                <h2>
                    Profile Information
                </h2>

                <form id="profileForm">

                    <label for="settingsName">
                        Full Name
                    </label>

                    <input
                        type="text"
                        id="settingsName"
                        placeholder="Enter your name"
                        required>

                    <label for="settingsEmail">
                        Email Address
                    </label>

                    <input
                        type="email"
                        id="settingsEmail"
                        placeholder="Enter your email"
                        readonly>

                    <label for="settingsPhone">
                        Phone Number
                    </label>

                    <input
                        type="tel"
                        id="settingsPhone"
                        placeholder="Enter your phone number">

                    <button
                        class="primary-btn"
                        type="submit">

                        Save Profile Changes

                    </button>

                </form>

            </div>

            <div class="settings-section">

                <h2>
                    Notifications
                </h2>

                <div class="setting-row">

                    <div>
                        <h3>
                            Event Notifications
                        </h3>

                        <p>
                            Receive updates about events and registrations.
                        </p>
                    </div>

                    <label class="switch">

                        <input
                            type="checkbox"
                            id="notificationToggle">

                        <span class="slider"></span>

                    </label>

                </div>

            </div>

            <div class="settings-section">

    <h2>
        Security
    </h2>

    <p class="security-text">
        Update your password to keep your EventHub account secure.
    </p>

    <button
        class="secondary-btn"
        id="changePasswordBtn"
        type="button">

        Change Password

    </button>

    <form
        id="passwordForm"
        class="password-form hidden">

        <label for="currentPassword">
            Current Password
        </label>

        <input
            type="password"
            id="currentPassword"
            placeholder="Enter your current password"
            required>

        <label for="newPassword">
            New Password
        </label>

        <input
            type="password"
            id="newPassword"
            placeholder="Enter a new password"
            required>

        <label for="confirmPassword">
            Confirm New Password
        </label>

        <input
            type="password"
            id="confirmPassword"
            placeholder="Re-enter your new password"
            required>

        <div class="password-actions">

            <button
                class="primary-btn"
                type="submit">

                Update Password

            </button>

            <button
                class="cancel-btn"
                id="cancelPasswordBtn"
                type="button">

                Cancel

            </button>

        </div>

    </form>

</div>

            <div class="settings-actions">

                <button
                    class="back-btn"
                    type="button"
                    onclick="goDashboard()">

                    ← Back to Dashboard

                </button>

                <button
                    class="logout-btn"
                    type="button"
                    onclick="logout()">

                    Logout

                </button>

            </div>

        </section>

    </main>

    <script src="settings.js"></script>

</body>
</html>
