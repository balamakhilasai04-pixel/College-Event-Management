<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
    name="viewport"
    content=
    "width=device-width, initial-scale=1.0">

    <title>
        Forgot Password
    </title>

    <link
    rel="stylesheet"
    href="forgot-password.css">

</head>

<body>

<div class="container">

    <div class="forgot-card">

        <h1>
            Reset Password
        </h1>

        <p>
            Enter your email
            and new password
        </p>

        <form id="forgotForm">

            <input
                type="email"
                id="email"
                placeholder="Enter Email"
                required
            >

            <input
                type="password"
                id="newPassword"
                placeholder=
                "Enter New Password"
                required
            >

            <button type="submit">
                Reset Password

            </button>

        </form>

    </div>

</div>

<script src=
"forgot-password.js">
</script>

</body>
</html>
