<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Edit Event
</title>

<link
rel="stylesheet"
href="./edit-event.css">

</head>

<body>

<div class="container">

<h1>
Edit Event
</h1>

<form id="editEventForm">

<input
type="text"
id="title"
placeholder="Event Title"
required>

<textarea
id="description"
placeholder="Event Description"
required>
</textarea>

<input
type="text"
id="category"
placeholder="Category"
required>

<input
type="text"
id="venue"
placeholder="Venue"
required>

<input
type="date"
id="date"
required>

<input
type="time"
id="time"
required>

<input
type="number"
id="capacity"
placeholder="Total Seats"
required>

<button
type="submit">

Update Event

</button>

</form>

</div>

<script
src="./edit-event.js">

</script>

</body>

</html>
